<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Faizal Illustrations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      align-items: stretch;
    }

    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
    }

    .contact-card {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: var(--space-lg) var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: var(--space-sm);
      transition: border-color 0.2s var(--ease), transform 0.2s var(--ease);
      min-height: 280px;
    }

    .contact-card:hover {
      border-color: var(--coral);
      transform: translateY(-3px);
    }

    .contact-card__icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-card__label {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
    }

    .contact-card__detail {
      color: var(--muted);
      font-size: 0.9rem;
      word-break: break-word;
    }

    .contact-showcase {
      margin-top: var(--space-md);
      aspect-ratio: 16 / 7;
      background: #1f1e24;
      border: 1px solid var(--line);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav__mark">Faizal Illustrations</a>
    <button class="nav__toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="prices.html">Prices</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <header class="page-head wrap">
      <h1 class="page-head__title">Contact</h1>
      <p class="page-head__sub">
        Discord is the fastest way to reach me. Email works too if you'd
        rather write it up properly.
      </p>
    </header>

    <section class="section">
      <div class="wrap">

        <div class="contact-grid">
          <a
            class="contact-card"
            href="https://discord.gg/wThntgCP"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Join the Discord server"
          >
            <span class="contact-card__icon">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
                <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.01c.12.099.246.197.373.291a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.893.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.001-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.673-3.548-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" fill="#8A9B7E"/>
              </svg>
            </span>
            <span class="contact-card__label">Discord</span>
            <span class="contact-card__detail">discord.gg/wThntgCP</span>
          </a>

          <a
            class="contact-card"
            href="mailto:faizalillustrationns@gmail.com"
            aria-label="Email faizalillustrationns@gmail.com"
          >
            <span class="contact-card__icon">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
                <path d="M2 5.5C2 4.67 2.67 4 3.5 4h17c.83 0 1.5.67 1.5 1.5v13c0 .83-.67 1.5-1.5 1.5h-17C2.67 20 2 19.33 2 18.5v-13z" stroke="#E8633D" stroke-width="1.3"/>

              </svg>
            </span>
            <span class="contact-card__label">Email</span>
            <span class="contact-card__detail">faizalillustrationns@gmail.com</span>
          </a>
        </div>

        <div class="contact-showcase">
          <!-- Faizal: drop your third image here -->
          Image coming soon
        </div>

      </div>
    </section>
  </main>

  <footer class="footer wrap">
    <span>&copy; 2026 Faizal Illustrations</span>
    <a href="prices.html">See prices</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
